<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLEN devient Licfap</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* fond néon animé */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 30% 30%, #00eaff55, transparent 40%),
        radial-gradient(circle at 70% 60%, #0066ff55, transparent 40%),
        radial-gradient(circle at 50% 80%, #00ffff55, transparent 40%);
    animation:moveLights 10s linear infinite;
}

@keyframes moveLights{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

.container{
    position:relative;
    text-align:center;
    padding:60px;
    border-radius:20px;
    background:rgba(5,15,40,0.8);
    box-shadow:
        0 0 20px #00eaff,
        0 0 40px #00eaff,
        inset 0 0 20px #0077ff;
}

/* titre néon */

h1{
    font-size:60px;
    color:#00eaff;
    text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff,
        0 0 40px #008cff;
    margin-bottom:30px;
}

/* texte */

p{
    font-size:22px;
    color:#dbeafe;
    text-shadow:0 0 10px #00bfff;
    max-width:700px;
}

</style>
</head>

<body>

<div class="container">
<h1>ORLEN devient Licfap</h1>
<p>
le célèbre site du groupe Yotvin rénové en site fonctionnel,
rien ne change, juste l'identité    https://yotvin.github.io/Licfap/
</p>
</div>

</body>
</html>
