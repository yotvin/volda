<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ORLEN 2D </title>
<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#87CEEB,#dff4ff);
font-family:Arial;
transition:background 0.2s;
}

canvas{
display:none;
margin:auto;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
display:none;
}

#menu{
position:absolute;
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

button{
font-size:20px;
padding:15px 30px;
cursor:pointer;
}

.windowNotif{
position:absolute;
width:260px;
background:#f0f0f0;
border:2px solid #555;
box-shadow:4px 4px 10px rgba(0,0,0,0.5);
}

.windowBar{
background:#2d89ef;
color:white;
padding:5px;
}

.windowBody{
padding:10px;
color:black;
}

@keyframes scroll{
0%{transform:translateX(100vw)}
100%{transform:translateX(-100%)}
}

</style>
</head>

<body>

<div id="menu">
<h1>ORLEN 2D</h1>
<button onclick="startGame()">Jouer</button>
</div>

<div id="ui">Score : <span id="score">0</span></div>

<canvas id="game" width="900" height="400"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score = 0
let gameOver = false
let corruption = false
let started = false

let player
let enemies
let clouds

function resetGame(){

score=0
gameOver=false
corruption=false

player={
x:100,
y:300,
vy:0,
jump:false
}

enemies=[]
clouds=[]

for(let i=0;i<5;i++){
clouds.push({
x:Math.random()*900,
y:Math.random()*150,
size:40+Math.random()*40
})
}

document.getElementById("score").innerText=0

document.querySelectorAll(".windowNotif").forEach(e=>e.remove())

document.body.style.background="linear-gradient(#87CEEB,#dff4ff)"

}

resetGame()

function startGame(){

document.getElementById("menu").style.display="none"
canvas.style.display="block"
document.getElementById("ui").style.display="block"

resetGame()

started=true

setTimeout(startCorruption,20000)

loop()

}

setInterval(spawnEnemy,1600)

document.addEventListener("keydown",e=>{

if(e.code==="Space" && !player.jump && started){

player.vy=-12
player.jump=true
playJump()

}

})

function spawnEnemy(){

if(!started)return

enemies.push({
x:900,
y:320,
w:30,
h:40
})

}

function update(){

if(gameOver || !started)return

score++
document.getElementById("score").innerText=score

player.vy+=0.6
player.y+=player.vy

if(player.y>=300){
player.y=300
player.jump=false
}

clouds.forEach(c=>{
c.x-=0.5
if(c.x<-100)c.x=900
})

enemies.forEach(e=>{

e.x-=6

if(
player.x<e.x+e.w &&
player.x+30>e.x &&
player.y<e.y+e.h &&
player.y+30>e.y
){
die()
}

})

enemies=enemies.filter(e=>e.x>-50)

}

function draw(){

ctx.clearRect(0,0,900,400)

drawClouds()

ctx.fillStyle="#2ecc71"
ctx.fillRect(player.x,player.y,30,30)

ctx.fillStyle="#e74c3c"

enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.w,e.h)
})

ctx.fillStyle="#444"
ctx.fillRect(0,350,900,50)

}

function drawClouds(){

ctx.fillStyle="white"

clouds.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()
})

}

function die(){

gameOver=true

showGameOver()

}

function showGameOver(){

const div=document.createElement("div")

div.innerHTML=`
<div style="
background:white;
width:100vw;
height:100vh;
position:absolute;
top:0;
left:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
">

<h1 style="font-size:60px;">vous êtes mort.</h1>

<button onclick="restartGame()">Recommencer</button>

<div style="
position:absolute;
bottom:20px;
white-space:nowrap;
font-size:18px;
animation:scroll 15s linear infinite;">
jeu créé par le groupe Yotvin, html, sécurisé, version 4.4
</div>

</div>
`

document.body.appendChild(div)

}

function restartGame(){

document.querySelectorAll("div").forEach(d=>{
if(d.innerHTML.includes("GAME OVER")) d.remove()
})

resetGame()

}

/* CORRUPTION */

function startCorruption(){

corruption=true

setInterval(screenShake,50)
setInterval(colorGlitch,120)
setInterval(playGlitchSound,100)
setInterval(spawnWindow,400)

}

/* SHAKE */

function screenShake(){

let x=(Math.random()-0.5)*20
let y=(Math.random()-0.5)*20

document.body.style.transform=`translate(${x}px,${y}px)`

}

/* COULEURS */

function colorGlitch(){

let r=Math.random()*255
let g=Math.random()*255
let b=Math.random()*255

document.body.style.background=`rgb(${r},${g},${b})`

}

/* FENETRES */

function spawnWindow(){

let win=document.createElement("div")
win.className="windowNotif"

win.style.left=Math.random()*700+"px"
win.style.top=Math.random()*300+"px"

win.innerHTML=`
<div class="windowBar">ORLEN OS</div>
<div class="windowBody">
Ce site a été infecté par m҉̫̬̝̙̦̂͐̔̃̆ả̸̩̘͈͛͊̓͑y҉̥͉̃̾̏̾a̴͈̳͓̎͛5҉̮̘̫̲͙̐͐͂̀̌4҉̘͕̂̿̋7̶̘̲̽̌͌8҈̗͚̪̪̪͑̒
</div>
`

document.body.appendChild(win)

}

/* AUDIO */

let audioCtx=new AudioContext()

function playTone(freq,time){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.frequency.value=freq
osc.type="square"

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.setValueAtTime(0.1,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(
0.001,
audioCtx.currentTime+time
)

osc.start()
osc.stop(audioCtx.currentTime+time)

}

function playJump(){
playTone(600,0.1)
}

function playGlitchSound(){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.type="sawtooth"
osc.frequency.value=50+Math.random()*2000

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.value=0.2

osc.start()
osc.stop(audioCtx.currentTime+0.05)

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
