<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Volda AI</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

header {
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-size:22px;
}

#chat {
    height:70vh;
    overflow-y:auto;
    padding:15px;
}

.message {
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    max-width:80%;
    line-height:1.4em;
}

.user {background:#3b82f6; margin-left:auto;}
.bot {background:#334155;}

.typing {
    opacity:0.6;
    font-style:italic;
}

#inputZone {
    display:flex;
    padding:10px;
    background:#1e293b;
}

input {
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
}

button {
    margin-left:10px;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

img {
    max-width:100%;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🤖 Volda AI</header>

<div id="chat"></div>

<div id="inputZone">
    <input id="userInput" placeholder="Écris ton message...">
    <button onclick="send()">Envoyer</button>
</div>

<script>

const chat = document.getElementById("chat");

// ===== MESSAGE =====
function addMessage(type){
    let div = document.createElement("div");
    div.className = "message " + type;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

// ===== TYPEWRITER (TEXTE SEULEMENT) =====
function typeText(element, text, speed=15){
    let i = 0;
    element.innerHTML = "";

    function typing(){
        if(i < text.length){
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// ===== CLEAN =====
function clean(text){
    return text.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
}

// ===== RANDOM =====
function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// ===== IA =====
function getAIResponse(input){

    let txt = clean(input);

    // HEURE
    if(/heure|temps/.test(txt)){
        return {
            text: "Il est actuellement " + new Date().toLocaleTimeString(),
            html: ""
        };
    }

    // SALUT
    if(/bonjour|salut|coucou|hey|yo/.test(txt)){
        return {
            text: random([
                "Bonjour 😊 j'espère que tu vas bien.",
                "Salut 👋 content de te voir ici.",
                "Coucou 😄 je suis prêt à discuter."
            ]),
            html: ""
        };
    }

    // AU REVOIR
    if(/au revoir|bye|a bientot|a plus/.test(txt)){
        return {
            text: random([
                "Au revoir 👋 à très bientôt.",
                "À plus tard 😄 prends soin de toi.",
                "À bientôt ! reviens quand tu veux."
            ]),
            html: ""
        };
    }

    // IDENTITÉ
    if(/qui es tu|c est quoi volda/.test(txt)){
        return {
            text: "Je suis Volda, une intelligence artificielle simulée capable de répondre naturellement sans API.",
            html: ""
        };
    }

    // PAR DÉFAUT → RECHERCHE
    return {
        text: "Voici ce que j'ai trouvé pour toi 🔎",
        html: `
        <br><b>${input}</b><br><br>

        ➤ Définition : ${input} est un sujet pouvant être expliqué selon différents contextes.<br><br>
        ➤ Explication : ce terme est utilisé dans plusieurs domaines selon son usage.<br><br>

        <img src="https://source.unsplash.com/400x200/?${input}">
        `
    };
}

// ===== ENVOI =====
function send(){

    let input = document.getElementById("userInput").value;
    if(!input) return;

    // message user
    let userMsg = addMessage("user");
    userMsg.innerHTML = input;

    // message bot
    let botMsg = addMessage("bot typing");
    botMsg.innerHTML = "Volda réfléchit...";

    setTimeout(()=>{

        let response = getAIResponse(input);

        botMsg.classList.remove("typing");

        // texte animé
        typeText(botMsg, response.text, 15);

        // HTML (image etc)
        setTimeout(()=>{
            botMsg.innerHTML += response.html;
        }, response.text.length * 15);

    }, 500);

    document.getElementById("userInput").value = "";
}

</script>

</body>
</html>
