<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORLEN ᵐᵘˢⁱᶜ ᵇᵃˢᵉ</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
text-align:center;
padding:25px;
font-size:30px;
font-weight:bold;
letter-spacing:1px;
}

.studio{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.panel{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:14px;
backdrop-filter:blur(8px);
}

.panel h2{margin-top:0;}

/* PIANO */

.piano{
display:flex;
height:200px;
user-select:none;
}

.key{
width:60px;
height:200px;
background:white;
border:1px solid #000;
box-sizing:border-box;
cursor:pointer;
}

.key:active{background:#ddd;}

/* DRUM PADS */

.pads{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:15px;
}

.pad{
background:#00e0ff;
padding:20px;
text-align:center;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.pad:active{transform:scale(0.95);}

.controls{margin-top:15px;}

button,select{
padding:10px 18px;
border:none;
border-radius:8px;
background:#00e0ff;
font-weight:bold;
cursor:pointer;
margin-right:10px;
}

button:hover{background:#00bcd4;}

.status{margin-top:10px;font-size:14px;opacity:0.8;}

footer{
text-align:center;
padding:30px;
opacity:0.7;
}

</style>
</head>

<body>

<header>🎵 ORLEN music base</header>

<div class="studio">

<!-- PIANO / INSTRUMENT -->
<div class="panel">
<h2>Instrument</h2>

<select id="instrumentSelect">
<option value="piano">Piano</option>
<option value="guitar">Guitare</option>
<option value="synth">Synthé</option>
</select>

<div class="piano">
<div class="key" data-note="261.63"></div>
<div class="key" data-note="293.66"></div>
<div class="key" data-note="329.63"></div>
<div class="key" data-note="349.23"></div>
<div class="key" data-note="392.00"></div>
<div class="key" data-note="440.00"></div>
<div class="key" data-note="493.88"></div>
</div>

<p>Touches: Do Re Mi Fa Sol La Si</p>

</div>

<!-- DRUMS -->
<div class="panel">
<h2>Batterie</h2>

<div class="pads">
<div class="pad" data-drum="kick">Kick</div>
<div class="pad" data-drum="kick2">Kick 2</div>
<div class="pad" data-drum="snare">Snare</div>
<div class="pad" data-drum="hihat">HiHat</div>
<div class="pad" data-drum="clap">Clap</div>
<div class="pad" data-drum="snare2">Snare 2</div>
<div class="pad" data-drum="hihat2">HiHat 2</div>
<div class="pad" data-drum="noise">FX</div>
</div>

</div>

<!-- RECORDER -->
<div class="panel">
<h2>Enregistrement</h2>

<div class="controls">
<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>
</div>

<div class="status" id="recStatus">Statut : prêt</div>

<a id="downloadLink" style="display:block;margin-top:15px"></a>

</div>

</div>

<footer>ORLEN music base • studio musical navigateur</footer>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const mediaDest = audioCtx.createMediaStreamDestination();
const recorder = new MediaRecorder(mediaDest.stream);

let chunks=[];
let instrument="piano";

const statusText=document.getElementById("recStatus");

/* instrument selection */

document.getElementById("instrumentSelect").onchange=e=>{
instrument=e.target.value;
}

/* recorder */

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{

let blob=new Blob(chunks,{type:'audio/webm'});
let url=URL.createObjectURL(blob);

let link=document.getElementById("downloadLink");
link.href=url;
link.download="orlen-music.mp3";
link.innerText="Télécharger en MP3";

chunks=[];
statusText.innerText="Statut : enregistrement terminé";

}

function connect(node){
node.connect(audioCtx.destination);
node.connect(mediaDest);
}

/* instruments */

function playPiano(freq){

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.type="sine";
osc.frequency.value=freq;

gain.gain.value=0.4;

osc.connect(gain);
connect(gain);

osc.start();
osc.stop(audioCtx.currentTime+0.6);

}

function playSynth(freq){

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.type="sawtooth";
osc.frequency.value=freq;

gain.gain.value=0.3;

osc.connect(gain);
connect(gain);

osc.start();
osc.stop(audioCtx.currentTime+0.8);

}

function playGuitar(freq){

let delay=audioCtx.createDelay();
let gain=audioCtx.createGain();

let osc=audioCtx.createOscillator();
osc.type="triangle";
osc.frequency.value=freq;

delay.delayTime.value=0.02;

gain.gain.value=0.4;

osc.connect(delay);
delay.connect(gain);
connect(gain);

osc.start();
osc.stop(audioCtx.currentTime+1);

}

/* piano keys */

document.querySelectorAll(".key").forEach(key=>{

key.addEventListener("mousedown",()=>{

let freq=parseFloat(key.dataset.note);

if(instrument==="piano") playPiano(freq);
if(instrument==="guitar") playGuitar(freq);
if(instrument==="synth") playSynth(freq);

});

});

/* drums */

function noise(duration,freq){

let bufferSize=audioCtx.sampleRate*duration;
let buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
let data=buffer.getChannelData(0);

for(let i=0;i<bufferSize;i++) data[i]=Math.random()*2-1;

let source=audioCtx.createBufferSource();
source.buffer=buffer;

let filter=audioCtx.createBiquadFilter();
filter.frequency.value=freq;

source.connect(filter);
connect(filter);

source.start();

}

function kick(){
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.frequency.setValueAtTime(150,audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.5);

gain.gain.setValueAtTime(1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);

osc.connect(gain);
connect(gain);

osc.start();
osc.stop(audioCtx.currentTime+0.5);
}

function kick2(){
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.type="square";
osc.frequency.value=90;

gain.gain.value=0.8;

osc.connect(gain);
connect(gain);

osc.start();
osc.stop(audioCtx.currentTime+0.4);
}

function snare(){noise(0.2,1200)}
function snare2(){noise(0.25,800)}
function hihat(){noise(0.05,9000)}
function hihat2(){noise(0.08,7000)}
function clap(){noise(0.15,3000)}


document.querySelectorAll(".pad").forEach(p=>{

p.onclick=()=>{

let d=p.dataset.drum;

if(d==="kick") kick();
if(d==="kick2") kick2();
if(d==="snare") snare();
if(d==="snare2") snare2();
if(d==="hihat") hihat();
if(d==="hihat2") hihat2();
if(d==="clap") clap();
if(d==="noise") noise(0.4,500);

}

});

/* recording */

function startRecording(){

if(recorder.state==="recording"){
statusText.innerText="Statut : déjà en enregistrement";
return;
}

recorder.start();
statusText.innerText="Statut : enregistrement en cours";

}

function stopRecording(){

if(recorder.state!=="recording"){
statusText.innerText="Statut : aucun enregistrement actif";
return;
}

recorder.stop();

}

</script>

</body>
</html>
