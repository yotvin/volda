<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Volda AI</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
header {
    background:#1e293b;
    padding:15px;
}

.logoContainer {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.logo {
    width:35px;
    height:35px;
    border-radius:8px;
}

/* CHAT */
#chat {
    height:70vh;
    overflow-y:auto;
    padding:15px;
}

.message {
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    max-width:80%;
}

.user {background:#3b82f6; margin-left:auto;}
.bot {background:#334155;}
.typing {opacity:0.6; font-style:italic;}

img {
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

/* INPUT */
#inputZone {
    display:flex;
    padding:10px;
    background:#1e293b;
}

input {
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
}

button {
    margin-left:10px;
    padding:12px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logoContainer">
        <img src="volda logo.png" class="logo">
        <span>Volda AI</span>
    </div>
</header>

<div id="chat"></div>

<div id="inputZone">
    <input id="userInput" placeholder="Écris ton message...">
    <button onclick="send()">Envoyer</button>
</div>

<script>

const chat = document.getElementById("chat");
let memory = [];

// MESSAGE
function addMessage(type, text=""){
    let div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

// TYPEWRITER
function typeText(el, text, speed=12){
    let i=0;
    el.innerHTML="";
    function t(){
        if(i<text.length){
            el.innerHTML+=text[i++];
            setTimeout(t,speed);
        }
    }
    t();
}

// CLEAN
function clean(t){
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// IA
function getAI(input){

    let txt = clean(input);
    memory.push(input);

    // HEURE
    if(/heure/.test(txt)){
        return {text:"Il est actuellement "+new Date().toLocaleTimeString()};
    }

    // SALUT
    if(/bonjour|salut|coucou/.test(txt)){
        return {text:"Bonjour 😊 content de discuter avec toi."};
    }

    // AU REVOIR
    if(/au revoir|bye/.test(txt)){
        return {text:"Au revoir 👋 à bientôt !"};
    }

    // MEMOIRE
    if(/souviens/.test(txt)){
        return {text:"Je me souviens de : "+memory.slice(-3).join(", ")};
    }

    // RECHERCHE
    return {
        text:"Voici ce que j’ai trouvé pour toi 🔎",
        html:`
        <br><b>${input}</b><br>
        ➤ Définition simple du sujet<br>
        ➤ Explication rapide<br><br>
        <img src="https://picsum.photos/400/200?random=${Math.floor(Math.random()*1000)}">
        `
    };
}

// ENVOI
function send(){

    let input = document.getElementById("userInput").value;
    if(!input) return;

    addMessage("user", input);

    let bot = addMessage("bot typing", "Volda réfléchit...");

    setTimeout(()=>{
        let r = getAI(input);
        bot.classList.remove("typing");

        typeText(bot, r.text);

        if(r.html){
            setTimeout(()=>{
                bot.innerHTML += r.html;
            }, r.text.length*12);
        }

    },500);

    document.getElementById("userInput").value="";
}

// ENTRÉE POUR ENVOYER
document.getElementById("userInput").addEventListener("keypress", function(e){
    if(e.key==="Enter"){
        send();
    }
});

</script>

</body>
</html>
