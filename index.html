<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Runner Corrompu</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#87CEEB,#dff4ff);
font-family:Arial;
}

canvas{
display:block;
margin:auto;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
}

.glitch{
animation:glitch 0.15s infinite;
}

@keyframes glitch{
0%{transform:translate(2px,0)}
50%{transform:translate(-2px,2px)}
100%{transform:translate(0,-2px)}
}

.windowNotif{
position:absolute;
width:260px;
background:#f0f0f0;
border:2px solid #555;
box-shadow:4px 4px 10px rgba(0,0,0,0.5);
font-family:Arial;
}

.windowBar{
background:#2d89ef;
color:white;
padding:5px;
font-size:14px;
}

.windowBody{
padding:10px;
color:black;
font-size:14px;
}

@keyframes scroll{
0%{transform:translateX(100vw)}
100%{transform:translateX(-100%)}
}

</style>
</head>

<body>

<div id="ui">Score : <span id="score">0</span></div>

<canvas id="game" width="900" height="400"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score = 0
let gameOver = false
let corruption = false

let player={
x:100,
y:300,
vy:0,
jump:false
}

let enemies=[]
let clouds=[]

for(let i=0;i<5;i++){
clouds.push({
x:Math.random()*900,
y:Math.random()*150,
size:40+Math.random()*40
})
}

function spawnEnemy(){
enemies.push({
x:900,
y:320,
w:30,
h:40
})
}

setInterval(spawnEnemy,1600)

document.addEventListener("keydown",e=>{

if(e.code==="Space" && !player.jump){

player.vy=-12
player.jump=true
playJump()

}

})

function update(){

if(gameOver)return

score++
document.getElementById("score").innerText=score

player.vy+=0.6
player.y+=player.vy

if(player.y>=300){
player.y=300
player.jump=false
}

clouds.forEach(c=>{
c.x-=0.5
if(c.x<-100)c.x=900
})

enemies.forEach(e=>{

e.x-=6

if(
player.x<e.x+e.w &&
player.x+30>e.x &&
player.y<e.y+e.h &&
player.y+30>e.y
){
die()
}

})

enemies=enemies.filter(e=>e.x>-50)

}

function draw(){

ctx.clearRect(0,0,900,400)

drawClouds()

ctx.fillStyle="#2ecc71"
ctx.fillRect(player.x,player.y,30,30)

ctx.fillStyle="#e74c3c"

enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.w,e.h)
})

ctx.fillStyle="#444"
ctx.fillRect(0,350,900,50)

}

function drawClouds(){

ctx.fillStyle="white"

clouds.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()
})

}

function die(){
gameOver=true
setTimeout(whiteGameOver,1000)
}

function whiteGameOver(){

document.body.innerHTML=`

<div style="
background:white;
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
">

<h1 style="font-size:60px;">GAME OVER</h1>

<button onclick="restartGame()" 
style="font-size:20px;padding:15px 30px;">
Recommencer
</button>

<div style="
position:absolute;
bottom:20px;
white-space:nowrap;
font-size:18px;
animation:scroll 15s linear infinite;">
MESSAGE SYSTEME
</div>

</div>

`

}

function restartGame(){
location.href = location.href
}

/* CORRUPTION APRES 1 MINUTE */

setTimeout(startCorruption,60000)

function startCorruption(){

corruption=true

document.body.classList.add("glitch")

setInterval(playGlitchSound,120)

setInterval(spawnWindow,500)

}

/* FENETRES */

function spawnWindow(){

let win=document.createElement("div")
win.className="windowNotif"

win.style.left=Math.random()*700+"px"
win.style.top=Math.random()*300+"px"

win.innerHTML=`
<div class="windowBar">System</div>
<div class="windowBody">
Message système
</div>
`

document.body.appendChild(win)

}

/* AUDIO */

let audioCtx=new AudioContext()

function playTone(freq,time){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.frequency.value=freq
osc.type="square"

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.setValueAtTime(0.1,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(
0.001,
audioCtx.currentTime+time
)

osc.start()
osc.stop(audioCtx.currentTime+time)

}

function funnyMusic(){

let notes=[262,330,392,523]

setInterval(()=>{

if(!corruption){

let n=notes[Math.floor(Math.random()*notes.length)]
playTone(n,0.2)

}

},400)

}

function playJump(){
playTone(600,0.1)
}

function playGlitchSound(){

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.type="sawtooth"
osc.frequency.value=50+Math.random()*2000

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.value=0.2

osc.start()
osc.stop(audioCtx.currentTime+0.05)

}

funnyMusic()

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
