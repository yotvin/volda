<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Volda AI</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}

header {background:#1e293b;padding:15px;}
.logoContainer {display:flex;align-items:center;justify-content:center;gap:10px;}
.logo {width:35px;height:35px;border-radius:8px;}

#chat {height:70vh;overflow-y:auto;padding:15px;}
.message {margin:10px 0;padding:12px;border-radius:12px;max-width:80%;}
.user {background:#3b82f6;margin-left:auto;}
.bot {background:#334155;}
.typing {opacity:0.6;font-style:italic;}

img {width:100%;border-radius:10px;margin-top:10px;}

#inputZone {display:flex;padding:10px;background:#1e293b;}
input {flex:1;padding:12px;border:none;border-radius:8px;}
button {margin-left:10px;padding:12px;background:#22c55e;border:none;border-radius:8px;}
</style>
</head>

<body>

<header>
<div class="logoContainer">
<img src="volda logo.png" class="logo">
<span>Volda AI</span>
</div>
</header>

<div id="chat"></div>

<div id="inputZone">
<input id="userInput" placeholder="Écris ton message...">
<button onclick="send()">Envoyer</button>
</div>

<script>

const chat=document.getElementById("chat");
let memory=[];

function add(type,text=""){
let d=document.createElement("div");
d.className="message "+type;
d.innerHTML=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
return d;
}

function type(el,text,s=12){
let i=0;el.innerHTML="";
(function t(){if(i<text.length){el.innerHTML+=text[i++];setTimeout(t,s);}})();
}

function clean(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function extract(text){
return clean(text).split(" ").slice(-2).join(" ");
}

function ai(input){

let txt=clean(input);
memory.push(input);

if(/heure/.test(txt)) return {t:"Il est "+new Date().toLocaleTimeString()};
if(/date|jour/.test(txt)) return {t:"Nous sommes le "+new Date().toLocaleDateString()};
if(/meteo|temps/.test(txt)) return {t:"Météo : 18°C ensoleillé"};
if(/bonjour|salut/.test(txt)) return {t:"Bonjour 😊 comment puis-je t'aider ?"};
if(/au revoir|bye/.test(txt)) return {t:"Au revoir 👋 à bientôt !"};
  if(/non|nan|nn/.test(txt)) return {t:"Pourquoi non ? quelque chose ne va pas ?"};

let topic=extract(input);

return {
t:"Voici ce que j'ai trouvé 🔎",
h:`<img src="https://loremflickr.com/400/200/${topic}" onerror="this.src='https://loremflickr.com/400/200/nature'">`
};

}

function send(){
let input=userInput.value;
if(!input) return;

add("user",input);
let b=add("bot typing","Volda réfléchit...");

setTimeout(()=>{
let r=ai(input);
b.classList.remove("typing");

type(b,r.t);

if(r.h){
setTimeout(()=>{b.innerHTML+=r.h;},r.t.length*12);
}

},500);

userInput.value="";
}

userInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>
</body>
</html>
